<!-- store/product_detail.html -->

{% extends 'base.html' %}

{% block content %}
<section class="container mx-auto px-6 py-12">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
        <!-- Product Image -->
        <div>
            <img src="{{ product.image.url }}" alt="{{ product.name }}" class="w-full h-auto object-cover rounded-lg shadow-lg">
        </div>

        <!-- Product Details -->
        <div>
            <h2 class="text-3xl font-bold text-gray-800">{{ product.name }}</h2>
            <p class="text-sm text-gray-600 mt-2">Category: {{ product.get_category_display }}</p>
            <p class="text-lg font-semibold text-gray-900 mt-4">Rs {{ product.price }}</p>
            <p class="text-md text-gray-700 mt-4">{{ product.description }}</p>

            <!-- Add to Cart Button -->
            <div class="mt-6">
                <a href="{% url 'add_to_cart' product.id %}" class="px-6 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 transition">
                    Add to Cart
                </a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
